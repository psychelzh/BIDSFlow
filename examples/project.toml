[project]
name = "Example BIDSFlow project"
root = "."
bids_root = "sourcedata/raw"
derivatives_root = "derivatives"

[execution]
backend = "apptainer"
work_root = "work"
logs_root = "logs"
state_root = "state"
max_jobs = 4

[heudiconv]
enabled = true
heuristic = "code/heuristics/heuristic.py"
outdir = "sourcedata/raw"
converter = "dcm2niix"

[fmriprep]
enabled = true
output_spaces = ["MNI152NLin2009cAsym:res-2", "fsLR"]
nprocs = 8
omp_nthreads = 4
mem_mb = 32000

[mriqc]
enabled = true
nprocs = 8
omp_nthreads = 4
mem_gb = 16

[xcpd]
enabled = true
mode = "linc"
atlases = ["Schaefer400"]
fd_thresh = 0.2

[qsiprep]
enabled = true
output_resolution = 1.5
nprocs = 8
omp_nthreads = 4
mem_mb = 32000

[qsirecon]
enabled = true
recon_spec = "mrtrix_multishell_msmt_ACT-fast"
nprocs = 8
omp_nthreads = 4
mem_mb = 32000
